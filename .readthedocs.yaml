version: 2

build:
  os: 'ubuntu-24.04'
  tools:
    python: '3.12'
  jobs:
    pre_build:
      - sphinx-apidoc -f -e --automodule-options "show-inheritance" --no-toc -o $READTHEDOCS_REPOSITORY_PATH/docs/source/apidoc $READTHEDOCS_REPOSITORY_PATH/rqutils/
      - rm $READTHEDOCS_REPOSITORY_PATH/docs/source/apidoc/rqutils.rst

python:
  install:
    - path: .
      extra_requireents:
        - docs

sphinx:
  configuration: docs/source/conf.py
